<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
            color: aliceblue;
        }
        #cardArray{
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: space-evenly;
            align-content: space-between;
        }
        img{
            height: 300px;
            width: 300px;
        }
         #card{
            display: block;
            border: 5px solid white;
            background-color: rgb(0, 0, 0);
            height: 500px;
            width: 400px;
            text-align: center;
         }
         #title{
             color: aliceblue;
         }
         #link{
            color: red;
         }
         #search{
            text-align: center;
         }
         #bar{
            width: 100%;
         }
    </style>
</head>
<body>
    <div id="search">
       <input type="text" id="bar">
    </div>
    <br>
    <br>
    <div id="cardArray">

    </div>
    <script>
        let request = new XMLHttpRequest();
        request.open("get","https://feecq.github.io/api/movies.json",false);
        request.send();
        let array = JSON.parse(request.response);
        createArr(array)
        let search = document.getElementById("bar");
        search.addEventListener("input",function(){
            let tex = search.value.trim().toLowerCase();
            if(tex){
             let newArray = array.filter(function(value){
              return  value.movie.toLowerCase().includes(tex)
             })
                let cardAr = document.getElementById("cardArray");
                console.log(cardAr)
                cardAr.remove();
                let CA = document.createElement("div");
                CA.id = "cardArray"
                document.body.appendChild(CA);
                console.log(CA)
                console.log(newArray)
             createArr(newArray);
            }
            else createArr(array)
        })
        function createArr(arr){
             arr.forEach(element => {
                let cardArray = document.getElementById("cardArray");
            let card = document.createElement("div");
            card.id="card"
            let img = document.createElement("img");
            img.src = element.image;
            let title = document.createElement("h3");
            title.innerText= element.movie;
            title.id="title"
            let link = document.createElement("a");
            link.id = "link"
            link.href = element.imdb_url;
            link.innerText = "IMDB "
            let imbdRating = document.createElement("p");
            imbdRating.innerText = "IMBD Rating : "+ element.rating;
            card.appendChild(img);
            card.appendChild(title)
            card.appendChild(link)
            card.appendChild(imbdRating)
            cardArray.appendChild(card)


        });
        }
       
    </script>
</body>
</html>
