<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Signup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .container h2 {
            text-align: center;
        }
        .container form {
            display: flex;
            flex-direction: column;
        }
        .container input {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .container button {
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .container button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div id="signup">
            <h2>Signup</h2>
            <form id="signupForm">
                <input type="text" id="signupUsername" placeholder="Username" required>
                <input type="password" id="signupPassword" placeholder="Password" required>
                <button type="submit">Signup</button>
            </form>
        </div>
        <div id="login" style="display: none;">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="text" id="loginUsername" placeholder="Username" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
        </div>
        <div id="products" style="display: none;">
            <h2>Products</h2>
            <input type="text" id="searchBox" placeholder="Search for a product">
            <button id="searchButton">Search</button>
            <ul id="productList">
                <li data-name="Laptop">Laptop</li>
                <li data-name="Phone">Phone</li>
                <li data-name="Tablet">Tablet</li>
                <li data-name="Camera">Camera</li>
            </ul>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
    const users = [];

    document.getElementById('signupForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('signupUsername').value;
        const password = document.getElementById('signupPassword').value;

        const userExists = users.find(user => user.username === username);

        if (userExists) {
            alert('Please login, user already exists.');
        } else {
            users.push({ username, password });
            alert('User created successfully!');
            document.getElementById('signup').style.display = 'none';
            document.getElementById('login').style.display = 'block';
        }
    });

    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;

        const user = users.find(user => user.username === username && user.password === password);

        if (user) {
            document.getElementById('login').style.display = 'none';
            document.getElementById('products').style.display = 'block';
        } else {
            alert('Invalid credentials.');
        }
    });

    document.getElementById('searchButton').addEventListener('click', () => {
        const searchValue = document.getElementById('searchBox').value.toLowerCase();
        const products = Array.from(document.querySelectorAll('#productList li'));

        const foundProduct = products.find(product => product.dataset.name.toLowerCase() === searchValue);

        if (foundProduct) {
            products.forEach(product => product.style.display = 'none');
            foundProduct.style.display = 'block';
        } else {
            alert('Product not found.');
        }
    });
});
    </script>
</body>
</html>
