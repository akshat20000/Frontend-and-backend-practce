<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .form-container:hover {
            transform: translateY(-5px);
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            letter-spacing: 1.5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
            color: #e0e0e0;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            outline: none;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group input:focus {
            background-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background-color: #ff5e62;
            border-radius: 25px;
            font-size: 16px;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #ff9068;
        }

        .form-container .form-group:last-child {
            margin-bottom: 0;
        }

        button:focus {
            outline: none;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <h2>Sign Up</h2>
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label for="roll">Roll Number</label>
            <input type="number" id="roll" placeholder="Enter your roll number">
        </div>
        <div class="form-group">
            <label for="class">Class</label>
            <input type="text" id="class" placeholder="Enter your class">
        </div>
        <div class="form-group">
            <label for="add">Address</label>
            <input type="text" id="add" placeholder="Enter your address">
        </div>
        <button id="signup">Sign Up</button>
    </div>

    <script>
        let name = document.getElementById("name");
        let roll = document.getElementById("roll");
        let clas = document.getElementById("class");
        let add = document.getElementById("add");
        const signup = document.getElementById("signup");
let signarray=[];
        signup.addEventListener("click", function () {
            let signob = {
                Name: name.value,
                Rollnumber: roll.value,
                Class: clas.value,
                Address: add.value
            };
signarray.push(signob)
            console.log(signob);
            localStorage.setItem('stud', JSON.stringify(signarray));
        });
    </script>
</body>

</html>
