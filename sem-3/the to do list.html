<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List 2</title>
    <style>
        #main {
            display: flex;
            height: 100vh;
        }
        #list {
            background-color: black;
            width: 50%;
            color: white;
            text-align: center;
        }
        #type {
            width: 50%;
        }
        #inp {
            width: 100%;
            height: 100%;
            font-size: large;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="list">
            <h1>To Do List</h1>
        </div>
        <div id="type">
            <textarea id="inp" placeholder="Type here"></textarea>
        </div>
    </div>

    <script>
        const list = document.getElementById("list");
        const input = document.getElementById("inp");
        let taskArray = JSON.parse(localStorage.getItem('task')) || [];

        // Function to create and add task elements to the list
        function addTask(taskObj) {
            const task = document.createElement("ul");
            const close = document.createElement("button");
            const check = document.createElement("input");
            
            check.type = "checkbox";
            close.innerText = "x";
            close.style.backgroundColor = "red";
            close.style.color = "white";

            task.style.color = "white";
            task.innerText = taskObj.name;

            task.appendChild(check);
            task.appendChild(close);
            list.appendChild(task);

            // Add event listeners for task completion and deletion
            check.addEventListener("change", () => task.style.textDecoration = check.checked ? "line-through" : "none");
            
            // Remove task from both UI and localStorage
            close.addEventListener("click", () => {
                task.remove(); // Remove task from UI
                taskArray = taskArray.filter(t => t.id !== taskObj.id); // Remove task from taskArray
                localStorage.setItem('task', JSON.stringify(taskArray)); // Update localStorage
            });
        }

        // Load tasks from localStorage when page loads
        taskArray.forEach(taskObj => addTask(taskObj));

        // Handle "Enter" key press to add tasks
        input.addEventListener("keypress", (event) => {
            if (event.key === "Enter" && input.value.trim()) {
                const taskText = input.value.trim();
                const taskObj = { id: Date.now(), name: taskText, completed: false };
                
                taskArray.push(taskObj);
                localStorage.setItem('task', JSON.stringify(taskArray));
                
                addTask(taskObj);
                input.value = "";
            }
        });
    </script>
</body>
</html>
