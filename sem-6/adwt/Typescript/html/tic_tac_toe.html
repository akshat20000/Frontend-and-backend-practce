<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .cell {
        width: 100px;
        height: 100px;
        font-size: 40px;
        border: none;
        border-radius: 20px;
        background: yellow;
        cursor: pointer;
    }

    #board {
        display: grid;
  grid-template-columns: repeat(3, 100px);
  grid-template-rows: repeat(3, 100px);
  gap: 10px;
    }
</style>

<body>
    <h3>Tic Tac Toe</h3>
    <div id="board">
    <button class="cell"></button>
    <button class="cell"></button>
    <button class="cell"></button>
    <button class="cell"></button>
    <button class="cell"></button>
    <button class="cell"></button>
    <button class="cell"></button>
    <button class="cell"></button>
    <button class="cell"></button>
    </div>
    <h2 id="result"></h2>
    <button class="resetbtn">Reset Game</button>
</body>

<script src="/js/tic_tac_toe.js"></script>

</html>
