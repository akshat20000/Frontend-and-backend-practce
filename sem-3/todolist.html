<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <style>
        #main {
            display: flex;
            height: 100vh;
        }
        #list {
            background-color: black;
            width: 50%;
            color: white;
            text-align: center;
            
        }
        #type {
            width: 50%;
        }
        #inp {
            height: 100%;
            width: 100%;
            font-size: large;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="list">
            <h1>Task List</h1>
        </div>
        <div id="type">
            <textarea id="inp" placeholder="I need to ..."></textarea>
        </div>
    </div>

    <script>
        const list = document.getElementById("list");
        const input = document.getElementById("inp");
        let taskArray = [];
        let done=false;

        // Function to add a new task
        function addTask(taskObj) {
            const task = document.createElement("ul");
            const closeBtn = document.createElement("button");
            const checkBox = document.createElement("input");

            checkBox.type = "checkbox";
            closeBtn.innerText = "x";
            closeBtn.style.backgroundColor = "red";
            closeBtn.style.color = "white";
            let para = input.value;
            task.style.color = "white";
            task.style.backgroundColor = "black";
            task.style.textAlign="left"
            task.innerText = taskObj.name;

            task.appendChild(checkBox);
            task.appendChild(closeBtn);
            list.appendChild(task);

            // Event listener for checkbox (task completion)
            checkBox.addEventListener("change", function() {
                task.style.textDecoration = checkBox.checked ? "line-through"  : "none";
                if(task.style.textDecoration ="line-through" ){
                    done =true

                }
                else{
                    done=false
                }
            });

            // Event listener for the close button (delete task)
            closeBtn.addEventListener("click", function() {
                taskArray.splice(taskArray.indexOf(para),1);
                localStorage.setItem("task",JSON.stringify(taskArray));
                task.remove();
            });
        }

        // Event listener for adding tasks with the "Enter" key
        input.addEventListener("keypress", function(event) {
            if (event.key === "Enter" && input.value.trim()) {
                let taskObj = {
                    id: Date.now(),
                    name: input.value,
                    completed: done
                };

                taskArray.push(taskObj);
                console.log(taskArray);
                localStorage.setItem('task', JSON.stringify(taskArray));

                addTask(taskObj);
                input.value = "";
            }
        });
    </script>
</body>
</html>
