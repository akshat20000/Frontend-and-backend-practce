<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; flex-direction: column; }
        .container { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; }
        h1 { font-size: 32px; color: #333; }
        .time { font-size: 48px; font-weight: bold; color: #333; margin-bottom: 20px; }
        button { background: #4CAF50; color: #fff; border: none; padding: 10px 20px; font-size: 18px; margin: 5px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #45a049; } button:active { background: #3e8e41; }
        .laps { list-style: none; padding: 0; margin-top: 10px; text-align: left; max-height: 150px; overflow-y: auto; width: 100%; }
        .laps li { background: #f7f7f7; padding: 5px 10px; border-bottom: 1px solid #ddd; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stopwatch</h1>
        <div class="time"><span id="minute">00</span>::<span id="second">00</span></div>
        <button id="startStop">start</button><button id="reset">reset</button><button id="lap">lap</button>
        <ul class="laps" id="lapsList"></ul>
    </div>
    
    <script>
        const [min, sec, startStop, reset, lap, lapsList] = ["minute", "second", "startStop", "reset", "lap", "lapsList"].map(id => document.getElementById(id));
        let intervalId, isRunning = false, lapCount = 0, pad = n => String(n).padStart(2, '0');
        
        startStop.onclick = () => {
            isRunning ? (clearInterval(intervalId), startStop.innerText = "start") : (startStop.innerText = "stop", intervalId = setInterval(() => { sec.innerText = pad(+sec.innerText + 1); if (sec.innerText >= 60) { sec.innerText = "00"; min.innerText = pad(+min.innerText + 1); } }, 1000));
            isRunning = !isRunning;
        };

        reset.onclick = () => {
            clearInterval(intervalId); isRunning = false; startStop.innerText = "start";
            min.innerText = sec.innerText = "00"; lapsList.innerHTML = ""; lapCount = 0;
        };

        lap.onclick = () => {
            if (isRunning) {
                const lapTime = `${pad(min.innerText)}:${pad(sec.innerText)}`;
                lapsList.innerHTML += `<li>Lap ${++lapCount}: ${lapTime}</li>`;
            }
        };
    </script>
</body>
</html>
